<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetry Family App</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #1abc9c; --bg: #f4f7f6; --male: #3498db; --female: #e91e63; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        .phone-frame { width: 100%; height: 100%; background: var(--bg); position: relative; display: flex; flex-direction: column; }
        .app-header { height: 60px; background: var(--primary); color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .view-area { flex-grow: 1; overflow: auto; position: relative; -webkit-overflow-scrolling: touch; background: #e5e7eb; }
        #canvas, #canvas-unmapped { min-width: 10000px; min-height: 5000px; background: white; background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 50px 50px; }
        
        .link { fill: none; stroke: #cbd5e0; stroke-width: 2.5px; opacity: 1; }
        .node-container { cursor: pointer; }
        .member-rect { stroke: #fff; stroke-width: 1px; }
        .node-text { fill: white; font-weight: bold; font-size: 11px; text-anchor: middle; pointer-events: none; }
        .marriage-group-bg { fill: rgba(248,252,252,0.9); stroke: #94a3b8; stroke-dasharray: 4; stroke-width: 1px; }
        
        #directory-view { flex-grow: 1; overflow-y: auto; background: white; display: none; padding-bottom: 80px; }
        .directory-header { position: sticky; top: 0; background: white; padding: 15px; border-bottom: 1px solid #eee; z-index: 10; }
        .search-box { width: 100%; padding: 10px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 14px; box-sizing: border-box; }
        .bottom-nav { height: 75px; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { text-align: center; font-size: 10px; color: #7f8c8d; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item span { font-size: 20px; display: block; margin-bottom: 2px; }
        .fab { position: fixed; right: 20px; bottom: 95px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 20; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .member-card { background: white; width: 85%; max-width: 320px; border-radius: 12px; padding: 20px; position: relative; }
        .member-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .jump-btn { font-size: 18px; color: var(--accent); padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        .jump-btn:active { background: #eee; }
    </style>
</head>
<body>

<div class="modal-overlay" id="modal" onclick="closeCard()">
    <div class="member-card" onclick="event.stopPropagation()">
        <span style="position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer;" onclick="closeCard()">×</span>
        <h3 id="m-name" style="margin: 0 0 10px 0; color: var(--primary);"></h3>
        <hr>
        <div id="m-details" style="font-size: 14px; line-height: 1.6; color: #444;"></div>
        <div style="margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;">
            <button onclick="openForm('details')" style="background: var(--accent); color: white; border: none; padding: 12px 15px; border-radius: 20px; font-weight: bold; width: 100%;">📝 Add Details</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="form-modal" onclick="closeForm()">
    <div class="member-card" style="width: 95%; height: 85%; max-width: 500px; padding: 10px;" onclick="event.stopPropagation()">
        <span style="position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer;" onclick="closeForm()">×</span>
        <iframe id="form-iframe" src="" width="100%" height="100%" frameborder="0"></iframe>
    </div>
</div>

<div class="phone-frame">
    <header class="app-header">
        <div style="font-weight:bold; font-size: 16px;" id="header-title">Tree</div>
        <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; padding:4px 8px; border-radius:4px; font-size:10px;">Reset</button>
    </header>
    <div class="view-area" id="pane"><div id="canvas"></div></div>
    <div class="view-area" id="pane-unmapped" style="display:none;"><div id="canvas-unmapped"></div></div>
    <div id="directory-view">
        <div class="directory-header">
            <input type="text" id="dirSearch" class="search-box" placeholder="Search relatives..." onkeyup="renderDirectory(this.value)">
        </div>
        <div id="member-list"></div>
    </div>
    <div class="fab" id="fab-button" onclick="centerNodes()">🏠</div>
    <div class="bottom-nav">
        <div class="nav-item active" id="tab-tree" onclick="switchTab('tree')"><span>🌳</span>Tree</div>
        <div class="nav-item" id="tab-unmapped" onclick="switchTab('unmapped')"><span>🗺️</span>Unmapped</div>
        <div class="nav-item" id="tab-members" onclick="switchTab('members')"><span>👥</span>Members</div>
    </div>
</div>

<script>
const boxW = 110, boxH = 35, canvasWidth = 10000, canvasHeight = 5000;
let svg, g, gUnmapped, root, unmappedRoot, allMembers = [], mDataMap = new Map(), lineageData = [], marriageData = [];

// Global animation lock to prevent bugging out the view on spam clicks
window.isAnimating = false;

const formLinks = {
    details: "https://docs.google.com/forms/d/e/1FAIpQLSeskFqcch7l1KlrrR0kRyJBMZza-7WyKgHQhDoiqxcEBWxSvQ/viewform?embedded=true",
    newMember: "https://docs.google.com/forms/d/e/1FAIpQLSdmgTda1cVu_dkElZt_XWGcaMPV681wImIDjx5LH4z1dH6p-A/viewform?embedded=true"
};

function switchTab(tab) {
    const panes = ['pane', 'pane-unmapped', 'directory-view'];
    panes.forEach(p => document.getElementById(p).style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    if (tab === 'tree') {
        document.getElementById('pane').style.display = 'block';
        document.getElementById('tab-tree').classList.add('active');
        document.getElementById('header-title').innerText = "Tree";
    } else if (tab === 'unmapped') {
        document.getElementById('pane-unmapped').style.display = 'block';
        document.getElementById('tab-unmapped').classList.add('active');
        document.getElementById('header-title').innerText = "Unmapped";
    } else {
        document.getElementById('directory-view').style.display = 'block';
        document.getElementById('tab-members').classList.add('active');
        document.getElementById('header-title').innerText = "Members";
        renderDirectory("");
    }
}

async function init() {
    try {
        const t = new Date().getTime();
        const [members, links] = await Promise.all([
            d3.csv(`members.csv?v=${t}`),
            d3.csv(`links.csv?v=${t}`)
        ]);
        allMembers = members;
        lineageData = links.filter(l => l.type === 'lineage');
        marriageData = links.filter(l => l.type === 'marriage');
        members.forEach(d => mDataMap.set(d.id, d));

        const mappedIds = new Set(['DH', 'NP']);
        let changed = true;
        while (changed) {
            changed = false;
            lineageData.forEach(l => {
                if (mappedIds.has(l.parent) && !mappedIds.has(l.child)) { mappedIds.add(l.child); changed = true; }
            });
            marriageData.forEach(m => {
                if (mappedIds.has(m.parent) && !mappedIds.has(m.child)) { mappedIds.add(m.child); changed = true; }
                if (mappedIds.has(m.child) && !mappedIds.has(m.parent)) { mappedIds.add(m.parent); changed = true; }
            });
        }

        function build(id, visited = new Set()) {
            const u = mDataMap.get(id);
            if (!u || visited.has(id)) return null;
            visited.add(id);

            const marriages = marriageData.filter(m => m.parent === id || m.child === id);
            const marriageDetails = marriages.map(mar => {
                const spouseId = mar.parent === id ? mar.child : mar.parent;
                const spouse = mDataMap.get(spouseId);
                const k = mar.parent + '+' + mar.child, alt = mar.child + '+' + mar.parent;
                const children = lineageData.filter(r => r.parent === k || r.parent === alt)
                    .map(r => build(r.child, new Set(visited))).filter(x => x);
                return { spouse, children: children.length ? children : null };
            });

            const soloChildren = lineageData.filter(r => r.parent === id)
                .map(r => build(r.child, new Set(visited))).filter(x => x);
            
            const allChildren = [...soloChildren, ...marriageDetails.flatMap(m => m.children || [])];
            const totalDesc = allChildren.reduce((acc, child) => acc + 1 + (child._total || 0), 0);

            return { 
                ...u, 
                marriages: marriageDetails, 
                children: allChildren.length ? allChildren : null,
                _direct: allChildren.length,
                _total: totalDesc 
            };
        }

        const universeGhost = { id: "UNIVERSE", name: "Universe", children: [build('DH'), build('NP')].filter(x => x) };
        root = d3.hierarchy(universeGhost);
        root.descendants().forEach(d => { if(d.depth > 1 && d.children) { d._children = d.children; d.children = null; } });

        const unmappedRoots = members.filter(m => !mappedIds.has(m.id) && !lineageData.some(l => l.child === m.id));
        unmappedRoot = d3.hierarchy({ id: "GHOST", children: unmappedRoots.map(r => build(r.id)).filter(x => x) });
        unmappedRoot.descendants().forEach(d => { if(d.depth > 0 && d.children) { d._children = d.children; d.children = null; } });

        svg = d3.select("#canvas").append("svg").attr("width", canvasWidth).attr("height", canvasHeight);
        g = svg.append("g").attr("transform", `translate(${canvasWidth/2}, 150)`);
        
        const svgU = d3.select("#canvas-unmapped").append("svg").attr("width", canvasWidth).attr("height", canvasHeight);
        gUnmapped = svgU.append("g").attr("transform", `translate(${canvasWidth/2}, 150)`);

        renderTree(root, g);
        renderTree(unmappedRoot, gUnmapped);
        
        setTimeout(centerNodes, 100);
    } catch (err) { console.error(err); }
}

function renderTree(sourceRoot, container) {
    const treeLayout = d3.tree().nodeSize([200, 240])
        .separation((a, b) => {
            const aSpouses = a.data.marriages ? a.data.marriages.length : 0;
            const bSpouses = b.data.marriages ? b.data.marriages.length : 0;
            return (a.parent === b.parent ? 1.0 : 1.1) + (aSpouses * 0.4) + (bSpouses * 0.4);
        });
        
    treeLayout(sourceRoot);
    const nodes = sourceRoot.descendants().filter(d => d.depth > 0);
    const links = sourceRoot.links().filter(d => d.source.depth > 0);
    const linkGen = d3.linkVertical().x(d => d.x).y(d => d.y);

    const link = container.selectAll(".link").data(links, d => d.target.data.id + d.source.data.id);
    link.exit().remove();
    link.enter().append("path").attr("class", "link")
        .merge(link).transition().duration(500)
        .attr("d", d => {
            const p = d.source.data, c = d.target.data;
            let startX = d.source.x;
            if (p.marriages) {
                const mIdx = p.marriages.findIndex(m => m.children && m.children.some(child => child.id === c.id));
                if (mIdx !== -1) startX += (mIdx + 1) * (boxW + 10);
            }
            return linkGen({ source: {x: startX, y: d.source.y + boxH/2}, target: {x: d.target.x, y: d.target.y - boxH/2} });
        });

    const node = container.selectAll(".node-container").data(nodes, d => d.data.id);
    node.exit().remove();
    const nE = node.enter().append("g").attr("class", "node-container").attr("transform", d => `translate(${d.x},${d.y})`);

    nE.each(function(d) {
        const el = d3.select(this), data = d.data;
        const mCount = data.marriages ? data.marriages.length : 0;
        const totalW = boxW + (mCount * (boxW + 10));
        
        if (mCount > 0) el.append("rect").attr("class", "marriage-group-bg").attr("x", -boxW/2 - 5).attr("y", -boxH/2 - 5).attr("width", totalW + 10).attr("height", boxH + 10).attr("rx", 5);
        
        drawBox(el, data, 0);
        
        if (data.marriages) {
            data.marriages.forEach((m, i) => {
                const xPos = (i + 1) * (boxW + 10);
                const sG = el.append("g").attr("transform", `translate(${xPos}, 0)`);
                drawBox(sG, m.spouse, 0);

                if (lineageData.some(l => l.child === m.spouse.id)) {
                    const hash = sG.append("g")
                        .attr("transform", `translate(${boxW/2 + 8}, -12)`)
                        .style("cursor", "pointer")
                        .on("click", (e) => { 
                            e.stopPropagation(); 
                            jumpToTree(m.spouse.id); 
                        });
                    hash.append("circle").attr("r", 9).attr("fill", "#e67e22").attr("stroke", "#fff").attr("stroke-width", "1.5px");
                    hash.append("text").attr("y", 3).attr("text-anchor", "middle").style("fill", "#fff").style("font-size", "10px").style("font-weight", "bold").text("#");
                }
            });
        }
        
        if (d.children || d._children) {
            const ui = el.append("g").attr("transform", `translate(${totalW/2 - boxW/2}, ${boxH/2 + 15})`)
                .on("click", (e) => { e.stopPropagation(); d.children ? (d._children = d.children, d.children = null) : (d.children = d._children, d._children = null); renderTree(sourceRoot, container); });
            ui.append("circle").attr("r", 12).attr("fill", "var(--primary)");
            ui.append("text").attr("y", 4).attr("text-anchor", "middle").style("fill", "white").style("font-size", "14px").text(d.children ? "-" : "+");
            ui.append("text").attr("y", 25).attr("text-anchor", "middle").style("fill", "var(--primary)").style("font-weight", "bold").style("font-size", "10px").text(`${d.data._direct} | ${d.data._total}`);
        }
    });
    node.merge(nE).transition().duration(500).attr("transform", d => `translate(${d.x},${d.y})`);
}

function drawBox(container, d, o) {
    if (!d) return;
    const b = container.append("g").on("click", (e) => { e.stopPropagation(); showCard(d); });
    b.append("rect").attr("id", `rect-${d.id}`).attr("class", "member-rect").attr("x", o - boxW/2).attr("y", -boxH/2).attr("width", boxW).attr("height", boxH).attr("fill", d.gender === 'M' ? 'var(--male)' : 'var(--female)').attr("rx", 3);
    b.append("text").attr("class", "node-text").attr("x", o).attr("y", 5).text(d.name);
}

// FIXED: Prioritize finding Primary Nodes first
function findPrimaryNode(node, id) {
    if (node.data.id === id || node.data.realId === id) return node;
    let kids = node.children || node._children;
    if (kids) {
        for (let i = 0; i < kids.length; i++) {
            let res = findPrimaryNode(kids[i], id);
            if (res) return res;
        }
    }
    return null;
}

// Fallback if they only exist as a spouse
function findSpouseFallback(node, id) {
    if (node.data.marriages && node.data.marriages.some(m => m.spouse && m.spouse.id === id)) return node;
    let kids = node.children || node._children;
    if (kids) {
        for (let i = 0; i < kids.length; i++) {
            let res = findSpouseFallback(kids[i], id);
            if (res) return res;
        }
    }
    return null;
}

function animatedJump(target, isUnmapped, id) {
    window.isAnimating = true; // Lock animation

    const paneId = isUnmapped ? 'pane-unmapped' : 'pane';
    const p = document.getElementById(paneId);
    const activeG = isUnmapped ? gUnmapped : g;

    // 1. Zoom Out
    activeG.transition().duration(600).attr("transform", `translate(${canvasWidth/2}, 150) scale(0.4)`);
    
    setTimeout(() => {
        // 2. Pan to coordinate
        const scaledX = canvasWidth/2 + target.x * 0.4;
        const scaledY = 150 + target.y * 0.4;
        p.scrollTo({ left: scaledX - p.clientWidth/2, top: scaledY - p.clientHeight/2, behavior: 'smooth' });

        setTimeout(() => {
            // 3. Zoom In
            activeG.transition().duration(600).attr("transform", `translate(${canvasWidth/2}, 150) scale(1)`);
            p.scrollTo({ left: target.x + (canvasWidth/2) - (p.clientWidth/2), top: target.y + 150 - (p.clientHeight/2), behavior: 'auto' });

            // 4. Highlight target & Release Lock
            setTimeout(() => {
                d3.selectAll('.member-rect').style('stroke', '#fff').style('stroke-width', '1px');
                d3.select(`#rect-${id}`).transition().duration(200).style('stroke', '#f1c40f').style('stroke-width', '4px')
                  .transition().duration(2000).style('stroke', '#fff').style('stroke-width', '1px');
                
                window.isAnimating = false; // Release lock
            }, 600);

        }, 600); 
    }, 600); 
}

function jumpToTree(id) {
    if (window.isAnimating) return;

    let target = findPrimaryNode(root, id);
    let isUnmapped = false;
    
    if (!target) {
        target = findPrimaryNode(unmappedRoot, id);
        isUnmapped = true;
    }
    
    // Fallback to Spouse search if not a primary node
    if (!target) {
        target = findSpouseFallback(root, id);
        isUnmapped = false;
        if (!target) {
            target = findSpouseFallback(unmappedRoot, id);
            isUnmapped = true;
        }
        if (!target) return alert("Member not found in tree view.");
    }

    switchTab(isUnmapped ? 'unmapped' : 'tree');
    const activeRoot = isUnmapped ? unmappedRoot : root;
    const activeG = isUnmapped ? gUnmapped : g;

    function collapseAll(n) {
        let kids = n.children || n._children;
        if (kids) {
            kids.forEach(collapseAll);
            if (n.depth >= 1) { n._children = kids; n.children = null; } 
            else { n.children = kids; n._children = null; }
        }
    }
    collapseAll(activeRoot);

    let curr = target.parent;
    while(curr) {
        if (curr._children) { curr.children = curr._children; curr._children = null; }
        curr = curr.parent;
    }

    renderTree(activeRoot, activeG);
    animatedJump(target, isUnmapped, id);
}

function centerNodes() { const p = document.getElementById('pane'); p.scrollTo({ left: (canvasWidth/2) - (p.clientWidth/2), top: 0, behavior: 'smooth' }); }

function renderDirectory(f = "") {
    const l = document.getElementById('member-list'); l.innerHTML = "";
    const filtered = allMembers.filter(m => (m.name||"").toLowerCase().includes(f.toLowerCase()));
    filtered.sort((a,b)=>a.name.localeCompare(b.name)).forEach(m => {
        const d = document.createElement('div'); d.className = 'member-item';
        d.innerHTML = `
            <div style="flex-grow: 1;" onclick="showCard({id:'${m.id}', name:'${m.name}', gender:'${m.gender}', location:'${m.location||''}'})">
                <b>${m.name}</b><br><small>ID: ${m.id}</small>
            </div>
            <div class="jump-btn" onclick="event.stopPropagation(); jumpToTree('${m.id}')" title="Show in Tree">❯</div>
        `;
        l.appendChild(d);
    });
}

function showCard(d) {
    document.getElementById('m-name').innerText = d.name;
    document.getElementById('m-details').innerHTML = `<b>ID:</b> ${d.id}<br><b>Gender:</b> ${d.gender}<br><b>Loc:</b> ${d.location || 'N/A'}`;
    document.getElementById('modal').style.display = 'flex';
}
function closeCard() { document.getElementById('modal').style.display = 'none'; }
function openForm(type) { document.getElementById('form-iframe').src = formLinks[type]; document.getElementById('form-modal').style.display = 'flex'; }
function closeForm() { document.getElementById('form-modal').style.display = 'none'; setTimeout(() => alert("Thanks for filling details..."), 300); }

window.onload = init;
</script>
</body>
</html>
